<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fleet Flow | Smart Logistics Management</title>
    <meta name="description"
        content="Centralized digital hub for fleet optimization, driver safety, and financial performance.">
    <!-- Google Fonts: Inter & Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700&display=swap"
        rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/main.css">
</head>

<body class="dark-theme">
    <div id="app">
        <!-- Sidebar -->
        <aside id="sidebar" class="sidebar hidden">
            <div class="sidebar-header">
                <div class="logo">
                    <i data-lucide="zap" class="logo-icon"></i>
                    <span class="logo-text">Fleet Flow</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="#dashboard" class="nav-item active" data-page="dashboard">
                    <i data-lucide="layout-dashboard"></i>
                    <span>Dashboard</span>
                </a>
                <a href="#vehicles" class="nav-item" data-page="vehicles">
                    <i data-lucide="ship"></i>
                    <span>Vessel Registry</span>
                </a>
                <a href="#drivers" class="nav-item" data-page="drivers">
                    <i data-lucide="users"></i>
                    <span>Captains & Crew</span>
                </a>
                <a href="#trips" class="nav-item" data-page="trips">
                    <i data-lucide="anchor"></i>
                    <span>Logistics Dispatch</span>
                </a>
                <a href="#maintenance" class="nav-item" data-page="maintenance">
                    <i data-lucide="wrench"></i>
                    <span>Maintenance</span>
                </a>
                <a href="#expenses" class="nav-item" data-page="expenses">
                    <i data-lucide="banknote"></i>
                    <span>Expenses</span>
                </a>
                <a href="#analytics" class="nav-item" data-page="analytics">
                    <i data-lucide="bar-chart-3"></i>
                    <span>Analytics</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <button id="logout-btn" class="btn-logout">
                    <i data-lucide="log-out"></i>
                    <span>Logout</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main id="main-content" class="main-content">
            <!-- Top Header -->
            <header id="top-header" class="top-header hidden">
                <div class="header-left">
                    <h1 id="page-title">Dashboard</h1>
                </div>
                <div class="header-right">
                    <div class="user-profile">
                        <div class="user-info">
                            <span class="user-name">Fleet Admin</span>
                            <span class="user-role">Manager</span>
                        </div>
                        <div class="user-avatar">FA</div>
                    </div>
                </div>
            </header>

            <!-- Page Dynamic Content -->
            <div id="page-container" class="page-container">
                <!-- Content will be injected here -->
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="js/store.js"></script>
    <script src="js/app.js"></script>
    <script src="js/pages/login.js"></script>
    <script src="js/pages/dashboard.js"></script>
    <script src="js/pages/vehicles.js"></script>
    <script src="js/pages/trips.js"></script>
    <script src="js/pages/maintenance.js"></script>
    <script src="js/pages/expenses.js"></script>
    <script src="js/pages/drivers.js"></script>
    <script src="js/pages/analytics.js"></script>
    <script>
        // Initialize Lucide icons
        lucide.createIcons();
    </script>
</body>

</html>
